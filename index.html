<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>スケッチブック風・連鎖絵しりとり</title>
    <style>
        /* 全体：スケッチブック風の温かみのある背景 */
        body {
            font-family: 'Hiragino Maru Gothic ProN', 'Comic Sans MS', sans-serif;
            background-color: #e6dfd3; /* クラフト紙っぽい色 */
            background-image: radial-gradient(#d3c9b8 10%, transparent 10%);
            background-size: 20px 20px;
            margin: 0;
            padding: 15px;
            color: #4a3b32;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .container {
            background-color: #fffdf9; /* 画用紙の白 */
            border: 4px solid #6d5843;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 1100px; /* 横画面用に広め */
            padding: 25px;
            box-sizing: border-box;
            position: relative;
        }
        /* スケッチブックのリング風の装飾 */
        .container::before {
            content: "◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯ ◯";
            position: absolute;
            top: -15px;
            left: 5%;
            width: 90%;
            color: #7f8c8d;
            font-size: 20px;
            letter-spacing: 15px;
            text-align: center;
            pointer-events: none;
        }

        h1 { font-size: 24px; color: #5c4033; margin-top: 5px; margin-bottom: 20px; }
        h2 { font-size: 20px; color: #5c4033; margin: 10px 0; }
        
        button {
            background-color: #e67e22;
            color: white;
            border: none;
            border-bottom: 4px solid #d35400;
            padding: 10px 24px;
            font-size: 16px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.1s;
        }
        button:active { transform: translateY(3px); border-bottom: 1px solid #d35400; }
        input[type="text"], input[type="number"] {
            padding: 10px;
            font-size: 16px;
            border: 2px dashed #9c826b;
            border-radius: 8px;
            background-color: #fffdf9;
            color: #4a3b32;
            text-align: center;
        }

        .screen { display: none; }
        .screen.active { display: block; }

        /* ★超重要：横スクロールのリレーロードマップ★ */
        .roadmap-outer {
            background: #f4eee1;
            border: 2px solid #bdae96;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
            overflow-x: auto; /* 横スクロールを許可 */
            white-space: nowrap;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.05);
        }
        .roadmap-container {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }
        .roadmap-endpoint {
            background: #c0392b;
            color: white;
            font-size: 28px;
            font-weight: bold;
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .roadmap-arrow {
            font-size: 24px;
            color: #bdae96;
            font-weight: bold;
        }
        .roadmap-node {
            display: inline-block;
            width: 100px;
            background: white;
            border: 2px solid #9c826b;
            border-radius: 8px;
            padding: 6px;
            box-sizing: border-box;
            vertical-align: middle;
            text-align: center;
        }
        .roadmap-node.active-now {
            border-color: #e67e22;
            background-color: #fff9e6;
            box-shadow: 0 0 10px #e67e22;
        }
        .roadmap-node.blank {
            background: #e8e3d7;
            border: 2px dashed #bdae96;
            color: #a49681;
        }
        .node-pname { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 2px;}
        .node-img { width: 80px; height: 80px; border: 1px solid #ddd; object-fit: contain; background: white; border-radius: 4px;}
        .node-secret-img { width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; background: #34495e; color: white; font-size: 12px; border-radius: 4px; font-weight: bold;}
        .node-chars { font-size: 11px; margin-top: 2px; color: #7f8c8d; }

        /* メインプレイエリア（横並びレイアウト用） */
        .game-main-layout {
            display: flex;
            justify-content: space-around;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        /* 画用紙風キャンバス */
        #canvas {
            border: 4px solid #6d5843;
            border-radius: 4px;
            background-color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: crosshair;
            touch-action: none;
        }
        .timer { font-size: 26px; font-weight: bold; color: #d35400; margin-bottom: 10px; }

        /* 結果発表 */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            text-align: left;
            margin-top: 20px;
        }
        .result-card {
            background: white;
            border: 2px solid #6d5843;
            border-radius: 8px;
            padding: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .result-card img { width: 100%; height: auto; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        .badge { background: #e67e22; color: white; padding: 4px 8px; border-radius: 12px; font-size: 14px; display: inline-block; margin-bottom: 10px;}
    </style>
</head>
<body>

<div class="container">
    <div id="global-roadmap-box" style="display:none;">
        <div id="round-title" style="font-weight: bold; font-size: 16px; margin-bottom: 5px; text-align: left;"></div>
        <div class="roadmap-outer">
            <div id="roadmap-list" class="roadmap-container">
                </div>
        </div>
    </div>

    <div id="screen-setup" class="screen active">
        <h1>🎨 スケッチブック絵しりとりゲー (人数×4周)</h1>
        <p>参加人数：<input type="number" id="player-count" value="3" min="2" max="10" style="width: 70px;"></p>
        <button onclick="generatePlayerInputs()">プレイヤー名を入力する</button>
        <div id="name-inputs-container" style="margin-top: 20px;"></div>
        <br>
        <button id="start-game-btn" onclick="startGame()" style="display:none; background-color: #27ae60; border-color: #1e8449;">お題を決めてスタート！</button>
    </div>

    <div id="screen-turn" class="screen">
        <h2 id="turn-message" style="font-size: 26px; color: #d35400;">〇〇さんの番です</h2>
        <p>前の人の答えが隠されました。心の準備ができたらボタンを押してね！</p>
        <button onclick="startDrawing()" style="font-size: 20px; padding: 12px 40px;">お絵描きを始める</button>
    </div>

    <div id="screen-draw" class="screen">
        <div class="game-main-layout">
            <div>
                <h2 id="drawer-name">〇〇さん、描いて！</h2>
                <div class="timer">残り時間: <span id="time-left">60</span>秒</div>
                <div>
                    <button onclick="clearCanvas()" style="background-color: #7f8c8d; border-color:#626d6e; margin-right:10px;">描き直す</button>
                    <button onclick="finishDrawing()" style="background-color: #27ae60; border-color: #1e8449;">描けた！(次へ)</button>
                </div>
            </div>
            <canvas id="canvas" width="380" height="380"></canvas>
        </div>
    </div>

    <div id="screen-answer" class="screen">
        <h2>今描いたものの「正解ワード」は？</h2>
        <p style="font-size: 14px; color:#7f8c8d;">※ひらがな、またはカタカナで入力してね</p>
        <input type="text" id="correct-answer" placeholder="例: りんご" style="font-size: 20px; width: 60%; max-width: 300px;"><br><br>
        <button onclick="submitAnswer()" style="background-color: #2980b9; border-color:#21618c;">確定して次の人へ</button>
    </div>

    <div id="screen-result" class="screen">
        <h2>🎉 結果発表 🎉</h2>
        <div style="display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin-bottom: 20px;">
            <div id="stats-area" style="background:#fff3cd; border:2px solid #ffc107; padding:15px; border-radius:8px; font-weight:bold; flex:1; min-width:250px;"></div>
            <div id="mvp-area" style="background:#d4edda; border:2px solid #28a745; padding:15px; border-radius:8px; font-weight:bold; flex:1; min-width:250px;"></div>
        </div>
        
        <h3 style="text-align: left; border-bottom: 2px dashed #9c826b; padding-bottom: 5px;">全員のリレー：</h3>
        <div id="result-grid-list" class="result-grid"></div>
        
        <div style="margin-top: 30px;">
            <button onclick="nextRound()" style="background-color: #27ae60; border-color: #1e8449; font-size:18px;">次のラウンドへ（メンバーを引き継ぐ）</button>
            <button onclick="location.reload()" style="background-color: #7f8c8d; border-color:#626d6e; margin-left:15px;">最初からやり直す</button>
        </div>
    </div>
</div>

<script>
    let players = [];
    let currentIndex = 0; // 全体の通算ターン (0 〜 人数×4 - 1)
    let totalTurns = 0;
    let gameData = [];   // ターン毎の { player, image, answer, timeSpent }
    
    let timerInterval;
    let timeLeft = 60;
    let timeSpent = 0;
    
    let startChar = "";
    let endChar = "";
    const hiragana = "あいうえおかきくけこさしすせそたちつてとなにぬねのはひふへほまみむめもやゆよらりるれろ";

    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    // 1. 設定
    function generatePlayerInputs() {
        const count = parseInt(document.getElementById('player-count').value);
        const container = document.getElementById('name-inputs-container');
        container.innerHTML = '';
        for (let i = 1; i <= count; i++) {
            const div = document.createElement('div');
            div.style.margin = "5px 0";
            div.innerHTML = `プレイヤー${i}: <input type="text" class="player-name" value="プレイヤー${i}" style="width:50%">`;
            container.appendChild(div);
        }
        document.getElementById('start-game-btn').style.display = 'inline-block';
    }

    function startGame() {
        const nameInputs = document.querySelectorAll('.player-name');
        players = Array.from(nameInputs).map(input => input.value.trim() || '名無し');
        totalTurns = players.length * 4;
        currentIndex = 0;
        gameData = [];
        
        initRoundOdai();
        document.getElementById('global-roadmap-box').style.display = 'block';
        showTurnScreen();
    }

    function initRoundOdai() {
        startChar = hiragana[Math.floor(Math.random() * hiragana.length)];
        do {
            endChar = hiragana[Math.floor(Math.random() * hiragana.length)];
        } while (startChar === endChar);
    }

    function changeScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    // ★ 視覚化ロードマップの描画処理 ★
    function drawRoadmap(revealAll = false) {
        const currentRound = Math.floor(currentIndex / players.length) + 1;
        document.getElementById('round-title').innerText = `【 ${currentRound} / 4 周目 】お題：『${startChar}』からはじまって『${endChar}』で終わる！`;

        const listEl = document.getElementById('roadmap-list');
        listEl.innerHTML = '';

        // スタート「あ」
        const startNode = document.createElement('div');
        startNode.className = 'roadmap-endpoint';
        startNode.innerText = startChar;
        listEl.appendChild(startNode);

        // 人数 × 4周分の枠を作る
        for (let i = 0; i < totalTurns; i++) {
            // 矢印
            const arrow = document.createElement('div');
            arrow.className = 'roadmap-arrow';
            arrow.innerText = '➔';
            listEl.appendChild(arrow);

            // ノード
            const node = document.createElement('div');
            node.className = 'roadmap-node';
            
            const pName = players[i % players.length];

            if (i < currentIndex) {
                // すでに描き終わった枠
                node.innerHTML = `<div class="node-pname">${pName}</div>`;
                
                // 次の人、または結果画面（revealAll）なら絵が見える
                if (revealAll || i === currentIndex - 1) {
                    node.innerHTML += `<img class="node-img" src="${gameData[i].image}">`;
                } else {
                    // それより前の絵は、プレイ中は隠してシークレット状態にする（前のリレーは見れるが、直前以外はモザイク的に隠すことでカンニング防止。もし全部見せたいならここを node.innerHTML += `<img class="node-img" src="${gameData[i].image}">`; にすればOK）
                    node.innerHTML += `<div class="node-secret-img">済</div>`;
                }
                node.innerHTML += `<div class="node-chars">${gameData[i].answer.length}文字</div>`;
            } else if (i === currentIndex) {
                // 現在まさに描いている人の枠
                node.classList.add('active-now');
                node.innerHTML = `
                    <div class="node-pname" style="color:#e67e22;">★ ${pName}</div>
                    <div style="font-size:24px; margin:20px 0; color:#e67e22;">✍</div>
                    <div class="node-chars">描画中</div>
                `;
            } else {
                // まだ書いていない空欄枠
                node.classList.add('blank');
                node.innerHTML = `
                    <div class="node-pname" style="color:#888;">${pName}</div>
                    <div style="font-size:20px; margin:20px 0;">？</div>
                    <div class="node-chars">ーー</div>
                `;
            }
            listEl.appendChild(node);
        }

        // ゴール「い」
        const endArrow = document.createElement('div');
        endArrow.className = 'roadmap-arrow';
        endArrow.innerText = '➔';
        listEl.appendChild(endArrow);

        const endNode = document.createElement('div');
        endNode.className = 'roadmap-endpoint';
        endNode.style.backgroundColor = '#27ae60';
        endNode.innerText = endChar;
        listEl.appendChild(endNode);
        
        // 現在のプレイヤー枠まで自動スクロール
        setTimeout(() => {
            const activeNode = document.querySelector('.active-now');
            if (activeNode) activeNode.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        }, 100);
    }

    // 2. 交代画面
    function showTurnScreen() {
        changeScreen('screen-turn');
        const playerInRound = players[currentIndex % players.length];
        document.getElementById('turn-message').innerText = `${playerInRound} さんの番です`;
        drawRoadmap(false); // 通常は直前の絵だけ見えるようにロードマップを描画
    }

    // 3. お絵描き画面
    function startDrawing() {
        changeScreen('screen-draw');
        const playerInRound = players[currentIndex % players.length];
        document.getElementById('drawer-name').innerText = `${playerInRound} さん、キャンバスに描いて！`;
        
        clearCanvas();
        setupCanvasEvents();
        drawRoadmap(false);
        
        timeLeft = 60;
        timeSpent = 0;
        document.getElementById('time-left').innerText = timeLeft;
        
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timeSpent++;
            document.getElementById('time-left').innerText = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                alert('時間切れ！正解入力へ移ります。');
                finishDrawing();
            }
        }, 1000);
    }

    function setupCanvasEvents() {
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.strokeStyle = '#4a3b32'; /* スケッチブックに合う色鉛筆っぽい色 */

        function getPos(e) {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        }
        function start(e) { isDrawing = true; const pos = getPos(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function draw(e) { if (!isDrawing) return; e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function stop() { isDrawing = false; }

        canvas.onmousedown = start; canvas.onmousemove = draw; canvas.onmouseup = stop; canvas.onmouseleave = stop;
        canvas.ontouchstart = start; canvas.ontouchmove = draw; canvas.ontouchend = stop;
    }

    function clearCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function finishDrawing() {
        clearInterval(timerInterval);
        changeScreen('screen-answer');
        document.getElementById('correct-answer').value = '';
    }

    // 4. 正解入力画面
    function submitAnswer() {
        const answerInput = document.getElementById('correct-answer').value.trim();
        if (!answerInput) {
            alert('正解のワードを入力してね！');
            return;
        }

        const imageData = canvas.toDataURL();
        const playerInRound = players[currentIndex % players.length];
        
        gameData.push({
            player: playerInRound,
            image: imageData,
            answer: answerInput,
            timeSpent: timeSpent
        });

        currentIndex++;
        if (currentIndex < totalTurns) {
            showTurnScreen();
        } else {
            showResult();
        }
    }

    // 5. 結果発表画面
    function showResult() {
        changeScreen('screen-result');
        drawRoadmap(true); // 最後はすべての絵を一斉公開！

        // --- 正答率の判定 ---
        let correctCount = 0;
        const maxScore = gameData.length + 1;
        
        if (gameData[0].answer.charAt(0) === startChar) correctCount++;
        for (let i = 0; i < gameData.length - 1; i++) {
            const lastChar = gameData[i].answer.slice(-1);
            const nextFirstChar = gameData[i+1].answer.charAt(0);
            if (lastChar === nextFirstChar && lastChar !== 'ん') correctCount++;
        }
        if (gameData[gameData.length - 1].answer.slice(-1) === endChar) correctCount++;
        
        const successRate = Math.round((correctCount / maxScore) * 100);
        
        document.getElementById('stats-area').innerHTML = `
            <div class="badge">しりとり結果</div><br>
            <span style="font-size: 24px; color:#d35400;">正答率: ${successRate}%</span><br>
            (${maxScore}箇所中 ${correctCount}箇所で成立しました！)`
        ;

        // --- MVPの判定 ---
        let fastestTurn = gameData[0];
        gameData.forEach(data => {
            if (data.timeSpent < fastestTurn.timeSpent) fastestTurn = data;
        });
        document.getElementById('mvp-area').innerHTML = `
            <div class="badge" style="background:#27ae60;">最速MVP</div><br>
            <span style="font-size: 20px; color:#27ae60;">${fastestTurn.player} さん</span><br>
            (作画タイム: わずか ${fastestTurn.timeSpent} 秒！)`
        ;

        // --- 下部の一覧カード生成 ---
        const gridList = document.getElementById('result-grid-list');
        gridList.innerHTML = '';
        gameData.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'result-card';
            
            let mark = "✅ 成功";
            if (index === 0 && data.answer.charAt(0) !== startChar) mark = "❌ スタート失敗";
            if (index > 0 && gameData[index-1].answer.slice(-1) !== data.answer.charAt(0)) mark = "❌ 不成立";
            if (index === gameData.length - 1 && data.answer.slice(-1) !== endChar) mark += " & ❌ ゴール失敗";

            card.innerHTML = `
                <div style="font-size: 12px; color: #7f8c8d;">${index + 1}番手: ${data.player}</div>
                <div style="font-weight: bold; font-size: 16px; margin: 4px 0;">${data.answer}</div>
                <div style="font-size: 11px; color: #e67e22;">${mark} (${data.timeSpent}秒)</div>
                <img src="${data.image}">
            `;
            gridList.appendChild(card);
        });
    }

    function nextRound() {
        currentIndex = 0;
        gameData = [];
        initRoundOdai();
        showTurnScreen();
    }
</script>

</body>
</html>
